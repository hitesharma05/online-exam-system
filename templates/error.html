{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}

{% block auth_content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;
            background:var(--bg);text-align:center;padding:2rem;">
    <div>
        <div style="font-size:5rem;margin-bottom:1rem;">
            {{ '🔍' if code == 404 else '⚠️' }}
        </div>
        <h1 style="font-size:2.5rem;font-weight:800;margin-bottom:.5rem;color:var(--text-primary);">
            {{ code }}
        </h1>
        <p style="font-size:1.1rem;color:var(--text-muted);margin-bottom:2rem;">{{ message }}</p>
        <a href="/" class="btn btn-primary">← Go Home</a>
    </div>
</div>
{% endblock %}
